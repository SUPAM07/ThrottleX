services:
  - type: web
    name: throttlex-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install; npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        sync: false
      - key: REDIS_TLS
        value: true
      - key: REDIS_MAX_RETRIES
        value: 3
      - key: ADMIN_API_KEY
        generateValue: true
      - key: DEFAULT_RATE_LIMIT
        value: 100
      - key: DEFAULT_WINDOW_MS
        value: 60000
      - key: DEFAULT_ALGORITHM
        value: token_bucket
      - key: ADAPTIVE_ENABLED
        value: true
      - key: GEO_ENABLED
        value: false
      - key: METRICS_ENABLED
        value: true
      - key: CIRCUIT_BREAKER_THRESHOLD
        value: 5
      - key: CIRCUIT_BREAKER_TIMEOUT_MS
        value: 30000
