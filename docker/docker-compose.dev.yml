version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: throttlex-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --protected-mode no
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - throttlex-dev-net

  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.dev
    container_name: throttlex-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: debug
    volumes:
      - ../backend/src:/app/src
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - throttlex-dev-net

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.dev
    container_name: throttlex-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:3000
    volumes:
      - ../frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - throttlex-dev-net

volumes:
  redis_dev_data:
    driver: local

networks:
  throttlex-dev-net:
    driver: bridge
