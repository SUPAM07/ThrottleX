version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: throttlex-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - throttlex-prod-net

  backend:
    image: throttlex/backend:${VERSION:-latest}
    container_name: throttlex-backend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: 3000
      LOG_LEVEL: warn
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - throttlex-prod-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 256M

  frontend:
    image: throttlex/frontend:${VERSION:-latest}
    container_name: throttlex-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - throttlex-prod-net

volumes:
  redis_prod_data:
    driver: local

networks:
  throttlex-prod-net:
    driver: bridge
