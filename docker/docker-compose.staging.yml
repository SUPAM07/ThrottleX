version: '3.9'

services:
  redis:
    image: redis:7.2-alpine
    container_name: throttlex-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - throttlex-staging-net

  backend:
    image: throttlex/backend:staging
    container_name: throttlex-backend-staging
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: staging
      REDIS_URL: redis://redis:6379
      PORT: 3000
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - throttlex-staging-net

  frontend:
    image: throttlex/frontend:staging
    container_name: throttlex-frontend-staging
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - throttlex-staging-net

volumes:
  redis_staging_data:
    driver: local

networks:
  throttlex-staging-net:
    driver: bridge
