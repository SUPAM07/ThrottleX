apiVersion: apps/v1
kind: Deployment
metadata:
  name: throttlex-frontend
  labels:
    app: throttlex-frontend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: throttlex-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: throttlex-frontend
    spec:
      containers:
        - name: throttlex-frontend
          image: throttlex/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
