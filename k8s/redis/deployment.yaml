apiVersion: apps/v1
kind: Deployment
metadata:
  name: throttlex-redis
  labels:
    app: throttlex-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: throttlex-redis
  template:
    metadata:
      labels:
        app: throttlex-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          command: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: redis-data
          emptyDir: {}
