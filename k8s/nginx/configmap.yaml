apiVersion: v1
kind: ConfigMap
metadata:
  name: throttlex-nginx-config
data:
  default.conf: |
    upstream backend {
      server throttlex-backend:3000;
    }

    upstream frontend {
      server throttlex-frontend:80;
    }

    server {
      listen 80;
      server_name _;

      location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
